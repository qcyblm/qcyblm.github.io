name: vuepress-deploy
on:
  push:
    branches:
      - master
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v2.3.4
        with:
          persist-credentials: false
          fetch-depth: 0
        env:
          TZ: Asia/Shanghai
      - name: Setup Node.js environment ⚙️
        uses: actions/setup-node@v2.1.5
        with:
          node-version: "14.16.1"
      - name: Install and Build 🔧
        run: |
          yarn
          yarn build
          cd src/.vuepress/dist
          git init
          git config --global init.defaultBranch master
          git config user.name ${{ secrets.ACCESS_NAME }}
          git config user.email ${{ secrets.ACCESS_EMAIL }}
          git remote add origin "https://${{ secrets.ACCESS_NAME }}:${{ secrets.ACCESS_TOKEN }}@github.com/qcyblm/qcyblm.github.io.git"
          git add -A
          git commit -q -m "Auto Deploy from GitHub Actions: $(date +"%Y-%m-%d %H:%M")"
          git push -f origin master:gh-pages

